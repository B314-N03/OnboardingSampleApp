name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'sample-data/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: railway-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # sample-data lives at the repo root but only server/ is deployed, so
      # bundle a copy the backend can read at runtime (server/sample-data).
      - name: Bundle sample data
        run: cp -r sample-data server/sample-data

      - name: Deploy
        run: railway up --service onboarding-backend --ci
        working-directory: server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
